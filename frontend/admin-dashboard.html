<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | SmartAcademic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-50 to-gray-100 min-h-screen">
  <nav class="bg-white/90 backdrop-blur-lg shadow-2xl sticky top-0 z-50 border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center space-x-4">
        <i class="fas fa-shield-alt text-4xl bg-gradient-to-r from-red-500 to-pink-500 p-4 rounded-2xl text-white shadow-xl"></i>
        <div>
          <h1 class="text-3xl font-black bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent">Admin Panel</h1>
          <p class="text-lg text-gray-600 font-semibold">AI Upload Verification System</p>
        </div>
      </div>
      <div class="flex items-center space-x-4">
        <span id="admin-name" class="font-bold text-gray-800 bg-red-100 px-5 py-2 rounded-full text-lg"></span>
        <button id="logout" class="bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white px-8 py-3 rounded-2xl font-bold shadow-xl hover:shadow-2xl transition-all">
          <i class="fas fa-sign-out-alt mr-3"></i>Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mb-12">
      <div class="bg-white rounded-3xl shadow-2xl p-10 border border-white/50 hover:shadow-3xl transition-all group">
        <div class="flex items-center">
          <div class="p-4 bg-gradient-to-r from-yellow-400 to-orange-400 rounded-2xl group-hover:scale-110 transition-all">
            <i class="fas fa-clock text-2xl text-white"></i>
          </div>
          <div class="ml-6">
            <p class="text-2xl font-bold text-gray-900" id="pending-count">0</p>
            <p class="text-sm font-medium text-gray-600 uppercase tracking-wide">Pending Review</p>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-3xl shadow-2xl p-10 border border-white/50 hover:shadow-3xl transition-all group">
        <div class="flex items-center">
          <div class="p-4 bg-gradient-to-r from-orange-400 to-red-400 rounded-2xl group-hover:scale-110 transition-all">
            <i class="fas fa-exclamation-triangle text-2xl text-white"></i>
          </div>
          <div class="ml-6">
            <p class="text-2xl font-bold text-gray-900" id="needs-review-count">0</p>
            <p class="text-sm font-medium text-gray-600 uppercase tracking-wide">Needs Review</p>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-3xl shadow-2xl p-10 border border-white/50 hover:shadow-3xl transition-all group">
        <div class="flex items-center">
          <div class="p-4 bg-gradient-to-r from-emerald-400 to-teal-400 rounded-2xl group-hover:scale-110 transition-all">
            <i class="fas fa-check-circle text-2xl text-white"></i>
          </div>
          <div class="ml-6">
            <p class="text-2xl font-bold text-gray-900" id="approved-count">0</p>
            <p class="text-sm font-medium text-gray-600 uppercase tracking-wide">Auto Approved</p>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-3xl shadow-2xl p-10 border border-white/50 hover:shadow-3xl transition-all group">
        <div class="flex items-center">
          <div class="p-4 bg-gradient-to-r from-indigo-400 to-blue-400 rounded-2xl group-hover:scale-110 transition-all">
            <i class="fas fa-users text-2xl text-white"></i>
          </div>
          <div class="ml-6">
            <p class="text-2xl font-bold text-gray-900" id="total-uploads">0</p>
            <p class="text-sm font-medium text-gray-600 uppercase tracking-wide">Total Uploads</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Subjects Library -->
    <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/50 overflow-hidden mb-12">
      <div class="border-b border-gray-200">
        <nav class="-mb-px flex space-x-8 px-8" aria-label="Tabs">
          <button class="tab-btn group flex-1 py-4 px-1 border-b-2 font-bold text-lg" data-tab="all">
            <i class="fas fa-book text-indigo-500 mr-3 text-xl"></i>
            All Subjects
            <span class="ml-2 px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-bold group-hover:bg-indigo-200">0</span>
          </button>
          <button class="tab-btn group flex-1 py-4 px-1 border-b-2 font-bold text-lg" data-tab="cse">
            <i class="fas fa-laptop-code text-green-500 mr-3 text-xl"></i>
            CSE
            <span class="ml-2 px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-bold group-hover:bg-green-200">0</span>
          </button>
          <button class="tab-btn group flex-1 py-4 px-1 border-b-2 font-bold text-lg" data-tab="ece">
            <i class="fas fa-microchip text-orange-500 mr-3 text-xl"></i>
            ECE
            <span class="ml-2 px-3 py-1 bg-orange-100 text-orange-800 rounded-full text-sm font-bold group-hover:bg-orange-200">0</span>
          </button>
        </nav>
      </div>
      <div id="subjects-tabs" class="p-8">
        <div class="subjects-container grid gap-6">
          <!-- Dynamic content loaded here -->
        </div>
        <!-- Add Subject Modal -->
        <div id="add-subject-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-6">
          <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full max-h-screen overflow-y-auto">
            <h3 class="text-3xl font-bold text-gray-900 mb-8 text-center">Add New Subject</h3>
            <form id="add-subject-form" class="space-y-6">
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-3">Subject Name *</label>
                <input type="text" id="new-subject-name" required placeholder="Data Structures & Algorithms" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm">
              </div>
              <div>
                <label class="block text-sm font-bold text-gray-700 mb-3">Branch *</label>
                <select id="new-subject-branch" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all shadow-sm">
                  <option value="">Select Branch</option>
                  <option value="CSE">Computer Science</option>
                  <option value="ECE">Electronics</option>
                  <option value="EEE">Electrical</option>
                  <option value="Mech">Mechanical</option>
                  <option value="Civil">Civil</option>
                </select>
              </div>
              <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white py-4 px-6 rounded-2xl font-bold shadow-xl hover:shadow-2xl transition-all">
                  <i class="fas fa-plus mr-2"></i>Add Subject
                </button>
                <button type="button" id="cancel-add" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white py-4 px-6 rounded-2xl font-bold shadow-xl hover:shadow-2xl transition-all">
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
        <button id="add-subject-btn" class="fixed bottom-8 right-8 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white p-5 rounded-3xl shadow-2xl hover:shadow-3xl text-2xl font-bold z-40 group hover:rotate-12 transition-all duration-300">
          <i class="fas fa-plus group-hover:hidden"></i>
          <i class="fas fa-magic group-hover:block animate-pulse"></i>
        </button>
      </div>
    </div>

    <!-- User Activity -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2">
        <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl p-10 border border-white/50">
          <h3 class="text-3xl font-black bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent mb-8 flex items-center">
            <i class="fas fa-chart-bar text-indigo-600 mr-4"></i>User Upload Activity
          </h3>
          <div id="user-activity" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamic user stats -->
          </div>
        </div>
      </div>
      <div>
        <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl p-10 border border-white/50 h-80 flex flex-col">
          <h3 class="text-2xl font-bold text-gray-900 mb-6 flex items-center">
            <i class="fas fa-robot text-purple-600 mr-3"></i>AI Verification Stats
          </h3>
          <canvas id="aiChart" width="400" height="200"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    const TOKEN_KEY = 'smart_token';

    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) {
        window.location.href = '/index.html';
        return;
      }

      updateAdminInfo(token);
      await loadStats();
      await loadUploads('needs-review');
      initTabs();
      loadUserActivity();
      initChart();
    });

    function updateAdminInfo(token) {
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('admin-name').textContent = payload.name || 'Admin';
      } catch (e) {
        logout();
      }
    }

    async function loadStats() {
      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const response = await fetch(`${API_BASE}/admin/uploads?status=pending`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const pending = await response.json();
        
        const response2 = await fetch(`${API_BASE}/admin/uploads?status=needs-review`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const needsReview = await response2.json();
        
        const response3 = await fetch(`${API_BASE}/admin/uploads?status=auto-approved`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const approved = await response3.json();

        const total = pending.length + needsReview.length + approved.length;

        document.getElementById('pending-count').textContent = pending.length;
        document.getElementById('needs-review-count').textContent = needsReview.length;
        document.getElementById('approved-count').textContent = approved.length;
        document.getElementById('total-uploads').textContent = total;
      } catch (error) {
        console.error('Stats error:', error);
      }
    }

    async function loadUploads(tab = 'needs-review') {
      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const response = await fetch(`${API_BASE}/admin/uploads?status=${tab}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const uploads = await response.json();

        const container = document.querySelector('.uploads-container');
        if (uploads.length === 0) {
          container.innerHTML = `
            <div class="col-span-full text-center py-20 px-8 border-2 border-dashed border-gray-300 rounded-3xl bg-gray-50/50">
              <i class="fas fa-inbox text-8xl text-gray-300 mb-12"></i>
              <h3 class="text-4xl font-bold text-gray-500 mb-6">${tab.replace('-', ' ').toUpperCase()}</h3>
              <p class="text-xl text-gray-400">No uploads in this category</p>
            </div>
          `;
        } else {
          container.innerHTML = uploads.map(upload => `
            <div class="bg-gradient-to-br from-white to-gray-50 p-8 rounded-3xl shadow-xl hover:shadow-2xl transition-all border border-gray-200 group">
              <div class="flex items-start justify-between mb-6">
                <div class="flex-1">
                  <div class="flex items-center mb-4">
                    <div class="w-3 h-3 rounded-full bg-gradient-to-r ${getStatusColor(upload.status)} mr-3"></div>
                    <h4 class="text-2xl font-bold text-gray-900">${upload.title}</h4>
                  </div>
                  <p class="text-xl text-indigo-700 font-semibold mb-2">${upload.subject}</p>
                  <div class="inline-flex items-center px-4 py-2 rounded-2xl text-sm font-bold bg-gray-100">
                    <i class="fas fa-file-${upload.fileType === 'pdf' ? 'pdf' : 'alt'} mr-2"></i>
                    ${upload.fileType.toUpperCase()}
                  </div>
                </div>
                <div class="ml-8 text-right shrink-0">
                  <div class="text-4xl font-black text-gray-900 mb-2">${upload.aiScore || '?'}</div>
                  <div class="text-2xl font-bold text-gray-600">AI Score</div>
                </div>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                  <p class="text-sm font-semibold text-gray-700 mb-1">Uploaded By</p>
                  <p class="font-bold text-lg">${upload.uploadedBy.name}</p>
                  <p class="text-sm text-gray-500">${upload.uploadedBy.email}</p>
                </div>
                <div>
                  <p class="text-sm font-semibold text-gray-700 mb-1">AI Reason</p>
                  <p class="italic text-gray-600">${upload.aiReason || 'Analysis complete'}</p>
                </div>
              </div>
              <div class="flex flex-wrap gap-3 pt-6 border-t border-gray-200">
                <a href="/uploads/${upload.fileUrl.split('/').pop()}" target="_blank" class="flex items-center px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all">
                  <i class="fas fa-eye mr-2"></i>Preview
                </a>
                ${upload.status !== 'auto-approved' ? `
                  <button onclick="moderateUpload('${upload._id}', 'approve')" class="flex items-center px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all">
                    <i class="fas fa-check mr-2"></i>Approve
                  </button>
                  <button onclick="moderateUpload('${upload._id}', 'reject')" class="flex items-center px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all">
                    <i class="fas fa-times mr-2"></i>Reject
                  </button>
                ` : ''}
                <button onclick="deleteUpload('${upload._id}')" class="flex items-center px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all ml-auto">
                  <i class="fas fa-trash mr-2"></i>Delete
                </button>
              </div>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('Uploads load error:', error);
      }
    }

    function getStatusColor(status) {
      const colors = {
        'pending': 'from-yellow-400 to-orange-400',
        'auto-approved': 'from-emerald-400 to-teal-400',
        'needs-review': 'from-orange-400 to-red-400',
        'rejected': 'from-red-400 to-pink-400'
      };
      return colors[status] || 'from-gray-400 to-gray-600';
    }

    async function moderateUpload(id, action) {
      if (!confirm(`Are you sure you want to ${action} this upload?`)) return;

      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const response = await fetch(`${API_BASE}/uploads/${id}/${action}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (response.ok) {
          loadStats();
          loadUploads();
          alert('Action completed successfully!');
        } else {
          alert('Action failed');
        }
      } catch (error) {
        console.error('Moderation error:', error);
        alert('Network error');
      }
    }

    async function deleteUpload(id) {
      if (!confirm('Are you sure you want to permanently delete this upload?')) return;

      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const response = await fetch(`${API_BASE}/uploads/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.ok) {
          loadStats();
          loadUploads();
          alert('Upload deleted');
        }
      } catch (error) {
        console.error('Delete error:', error);
      }
    }

    function initTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-600'));
          btn.classList.add('border-indigo-600', 'text-indigo-600');
          const tab = btn.dataset.tab;
          loadUploads(tab);
        });
      });
    }

    async function loadUserActivity() {
      try {
        const token = localStorage.getItem(TOKEN_KEY);
        const response = await fetch(`${API_BASE}/admin/uploads`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const uploads = await response.json();

        const userStats = {};
        uploads.forEach(upload => {
          const userId = upload.uploadedBy._id;
          if (!userStats[userId]) {
            userStats[userId] = { name: upload.uploadedBy.name, email: upload.uploadedBy.email, count: 0, statuses: {} };
          }
          userStats[userId].count++;
          userStats[userId].statuses[upload.status] = (userStats[userId].statuses[upload.status] || 0) + 1;
        });

        const container = document.getElementById('user-activity');
        container.innerHTML = Object.values(userStats).slice(0, 6).map(user => `
          <div class="p-8 bg-gradient-to-r from-indigo-50 to-purple-50 rounded-3xl border border-indigo-200 hover:shadow-xl transition-all group">
            <div class="flex items-start justify-between mb-6">
              <div class="flex-1">
                <h5 class="text-xl font-bold text-gray-900 mb-2">${user.name}</h5>
                <p class="text-sm text-gray-600">${user.email}</p>
              </div>
              <div class="text-3xl font-bold text-indigo-600">${user.count}</div>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
              <div class="px-3 py-2 bg-yellow-100 rounded-xl">
                <div class="font-bold text-lg">${user.statuses.pending || 0}</div>
                <div class="text-xs text-yellow-800">Pending</div>
              </div>
              <div class="px-3 py-2 bg-orange-100 rounded-xl">
                <div class="font-bold text-lg">${user.statuses['needs-review'] || 0}</div>
                <div class="text-xs text-orange-800">Review</div>
              </div>
              <div class="px-3 py-2 bg-emerald-100 rounded-xl">
                <div class="font-bold text-lg">${user.statuses['auto-approved'] || 0}</div>
                <div class="text-xs text-emerald-800">Approved</div>
              </div>
            </div>
          </div>
        `).join('') || `
          <div class="col-span-full text-center py-20 px-8 border-2 border-dashed border-gray-300 rounded-3xl bg-gray-50">
            <i class="fas fa-users-slash text-8xl text-gray-300 mb-8"></i>
            <h3 class="text-3xl font-bold text-gray-500 mb-4">No User Activity</h3>
            <p class="text-xl text-gray-400">Wait for students to upload resources</p>
          </div>
        `;
      } catch (error) {
        console.error('User activity error:', error);
      }
    }

    function initChart() {
      // Simple mock chart with canvas
      const canvas = document.getElementById('aiChart');
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 0, 400, 200);
      
      // Draw AI score distribution mock bars
      const bars = [25, 45, 78, 92, 65, 88];
      const maxHeight = 120;
      const barWidth = 50;
      bars.forEach((height, i) => {
        const barHeight = (height / 100) * maxHeight;
        const color = height > 70 ? '#10b981' : height > 40 ? '#f59e0b' : '#ef4444';
        ctx.fillStyle = color;
        ctx.fillRect(i * 60 + 20, 200 - barHeight, barWidth, barHeight);
        ctx.fillStyle = '#6b7280';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(height, i * 60 + 45, 190);
      });
    }

    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = '/index.html';
    });
  </script>
</body>
</html>
