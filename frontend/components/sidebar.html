  <div id="sidebar-stats" class="space-y-4">
    <div class="p-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-white rounded-2xl">
      <div class="text-2xl font-bold" id="sidebar-uploads">0</div>
      <div class="text-sm opacity-90">My Uploads</div>
    </div>
    <div class="p-4 bg-gradient-to-r from-yellow-500 to-orange-500 text-white rounded-2xl">
      <div class="text-2xl font-bold" id="sidebar-pending">0</div>

    <div class="p-4 bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-2xl">
      <div class="text-2xl font-bold" id="sidebar-downloads">0</div>
      <div class="text-sm opacity-90">Downloads</div>
    </div>
  </div>

  <button onclick="logout()" class="w-full mt-12 bg-gradient-to-r from-red-500 to-pink-500 text-white py-4 px-6 rounded-2xl font-bold shadow-xl hover:shadow-2xl hover:from-red-600 hover:to-pink-600 transition-all">
    <i class="fas fa-sign-out-alt mr-3"></i>Logout
  </button>
</div>

<script>
  async function loadSidebarStats() {
    try {
      const token = localStorage.getItem('token');
      const response = await fetch('/api/student/dashboard', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await response.json();
      
      document.getElementById('sidebar-uploads').textContent = data.myUploads || 0;
      document.getElementById('sidebar-pending').textContent = data.pendingUploads || 0;
      document.getElementById('sidebar-approved').textContent = data.approvedUploads || 0;
      document.getElementById('sidebar-downloads').textContent = data.downloads || 0;
    } catch (e) {
      console.log('Sidebar stats unavailable');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = '/';
  }

  // Load on init
  loadSidebarStats();
</script>
