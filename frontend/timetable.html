<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timetable • SmartAcademic</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    :root {
      --bg: #0b1220;
      --card-bg: rgba(255,255,255,0.92);
      --muted: #9aa7b2;
      --text: #0f172a;
      --text-invert: #ffffff;
      --ring: #7c3aed;
      --ring-2: #22c55e;
      --grad-1: #0ea5e9;   /* sky-500 */
      --grad-2: #8b5cf6;   /* violet-500 */
      --grad-3: #f59e0b;   /* amber-500 */
      --grad-4: #10b981;   /* emerald-500 */
      --shadow-strong: 0 25px 60px rgba(0,0,0,.35);
      --shadow-soft: 0 10px 30px rgba(0,0,0,.18);
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    /* Base layout */
    html, body { height: 100%; }
    body.app {
      margin: 0; display: flex; gap: 24px; padding: 24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background */
    body.app::before {
      content: ""; position: fixed; inset: -10% -10% -10% -10%; z-index: -2;
      background: radial-gradient(900px 500px at 10% 5%, rgba(139,92,246,.22), transparent 60%),
                  radial-gradient(700px 400px at 95% 15%, rgba(16,185,129,.20), transparent 60%),
                  radial-gradient(800px 550px at 25% 95%, rgba(14,165,233,.20), transparent 60%),
                  linear-gradient(135deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-4));
      filter: blur(28px) saturate(120%);
      background-size: 300% 300%;
      animation: bg-pan 20s ease-in-out infinite;
    }
    @keyframes bg-pan { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

    /* Subtle floating for hero and cards */
    .float { animation: floatY 7s ease-in-out infinite; }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    /* Sidebar */
    .sidebar-embed {
      width: 280px; height: 95vh; border: 0; border-radius: var(--radius-lg); box-shadow: var(--shadow-strong);
    }

    /* Main */
    main { flex: 1; display: grid; align-content: start; gap: 16px; }

    /* Headings and text */
    .heading-xl {
      font-size: clamp(28px, 3vw, 40px); font-weight: 900; line-height: 1.1; margin: 0 0 6px 0;
      letter-spacing: -0.02em;
    }
    .heading-gradient {
      background: linear-gradient(90deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-4));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 4px 18px rgba(255,255,255,.12));
      animation: hueRotate 8s linear infinite;
      display: inline-block;
    }
    @keyframes hueRotate { from{ filter: hue-rotate(0deg) drop-shadow(0 4px 18px rgba(255,255,255,.12)); } to{ filter: hue-rotate(360deg) drop-shadow(0 4px 18px rgba(255,255,255,.12)); } }

    .subtitle { margin: 0; color: #d1d5db; font-weight: 600; letter-spacing: .2px; }
    .subtitle.accent { background: linear-gradient(90deg, #93c5fd, #a7f3d0); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* Panels */
    .panel {
      background: var(--card-bg); backdrop-filter: blur(12px);
      border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-strong);
      position: relative; isolation: isolate;
    }
    .panel.rainbow::before {
      content: ""; position: absolute; inset: -2px; border-radius: inherit; z-index: -1;
      background: conic-gradient(from 0deg, var(--grad-3), #ef4444, var(--grad-2), #3b82f6, var(--grad-4), var(--grad-3));
      filter: blur(6px); opacity: .65; animation: spin 9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(1turn); } }

    /* Grid */
    .grid { display: grid; gap: 16px; grid-template-columns: 1fr 2fr; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

    /* Forms */
    .control { display: grid; gap: 6px; }
    .label { font-weight: 700; color: var(--text); }
    .input, .select {
      padding: 12px 12px; border: 1px solid #e5e7eb; border-radius: var(--radius-md); font-size: 15px; color: var(--text);
      background: #fff; outline: none; transition: box-shadow .2s, border-color .2s, transform .12s ease;
    }
    .input:focus, .select:focus {
      border-color: var(--ring); box-shadow: 0 0 0 4px rgba(124,58,237,.18), 0 1px 0 0 rgba(0,0,0,.02);
      transform: translateY(-1px);
    }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
      border: 0; border-radius: var(--radius-md); padding: 12px 16px; font-weight: 900; color: var(--text-invert);
      background: linear-gradient(135deg, var(--grad-2), var(--grad-1)); box-shadow: 0 12px 30px rgba(99,102,241,.35);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease; position: relative; overflow: hidden;
    }
    .btn:hover { transform: translateY(-1px) scale(1.01); box-shadow: 0 18px 40px rgba(99,102,241,.45); filter: saturate(1.1); }
    .btn::after {
      content: ""; position: absolute; inset: 0; border-radius: inherit; opacity: 0; transition: opacity .2s;
      background: radial-gradient(120px 80px at var(--x,50%) var(--y,50%), rgba(255,255,255,.28), transparent 45%);
    }
    .btn:hover::after { opacity: 1; }

    .btn-danger { background: linear-gradient(135deg, #ef4444, #f59e0b); box-shadow: 0 12px 30px rgba(239,68,68,.35); }
    .btn-danger:hover { box-shadow: 0 18px 40px rgba(239,68,68,.45); }

    /* List items */
    .item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-md);
      border: 1px solid rgba(229,231,235,0.65); background: rgba(255,255,255,.96); transition: transform .2s, box-shadow .2s;
    }
    .item:hover { transform: translateY(-2px); box-shadow: var(--shadow-soft); }
    .item .tag { font-weight: 900; min-width: 64px; text-align: center; color: var(--text); }
    .item .time { min-width: 96px; color: #374151; font-weight: 700; }
    .item .subject { flex: 1; font-weight: 800; background: linear-gradient(90deg, #111827, #334155); -webkit-background-clip: text; color: transparent; }
    .item .room { color: #64748b; font-weight: 600; }

    .cluster { display: flex; align-items: center; gap: 10px; }

    /* Reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      .float, .panel.rainbow::before, .heading-gradient, body.app::before { animation: none !important; }
    }
  </style>
</head>
<body class="app">
  <iframe class="sidebar-embed float" src="/frontend/components/sidebar.html"></iframe>

  <main>
    <header class="float">
      <h1 class="heading-xl"><span class="heading-gradient">Timetable</span></h1>
      <p class="subtitle accent">Add and manage your class schedule effortlessly</p>
    </header>

    <section class="grid">
      <!-- Add Entry Panel -->
      <div class="panel rainbow float">
        <h2 class="heading-gradient" style="font-size:18px; font-weight:900; margin:0 0 12px 0;">Add Entry</h2>
        <form id="ttForm" style="display:grid; gap:12px;">
          <label class="control">
            <span class="label">Day</span>
            <select id="day" class="select" required>
              <option value="Mon">Mon</option>
              <option value="Tue">Tue</option>
              <option value="Wed">Wed</option>
              <option value="Thu">Thu</option>
              <option value="Fri">Fri</option>
              <option value="Sat">Sat</option>
            </select>
          </label>
          <label class="control">
            <span class="label">Time</span>
            <input id="time" class="input" type="time" required />
          </label>
          <label class="control">
            <span class="label">Subject</span>
            <input id="subject" class="input" type="text" placeholder="e.g., Data Structures" required />
          </label>
          <label class="control">
            <span class="label">Room</span>
            <input id="room" class="input" type="text" placeholder="e.g., B-204" />
          </label>
          <button type="submit" class="btn" id="addBtn"><i class="fa-solid fa-plus"></i> Add</button>
        </form>
      </div>

      <!-- Schedule Panel -->
      <div class="panel rainbow float">
        <div class="cluster" style="justify-content: space-between; margin-bottom:12px;">
          <h2 class="heading-gradient" style="font-size:18px; font-weight:900; margin:0;">My Schedule</h2>
          <select id="filterDay" class="select">
            <option value="">All Days</option>
            <option value="Mon">Mon</option>
            <option value="Tue">Tue</option>
            <option value="Wed">Wed</option>
            <option value="Thu">Thu</option>
            <option value="Fri">Fri</option>
            <option value="Sat">Sat</option>
          </select>
        </div>
        <div id="list" style="display:grid; gap:10px;" aria-live="polite" aria-busy="false"></div>
      </div>
    </section>
  </main>

  <script>
    const API = '/api/timetable';

    // Dynamic glow position for buttons
    document.addEventListener('mousemove', (e) => {
      document.querySelectorAll('.btn').forEach(btn => {
        const rect = btn.getBoundingClientRect();
        btn.style.setProperty('--x', `${e.clientX - rect.left}px`);
        btn.style.setProperty('--y', `${e.clientY - rect.top}px`);
      });
    });

    function entryCard(e) {
      const roomHtml = e.room ? ` • <span class="room">${e.room}</span>` : '';
      return `
        <div class="item">
          <div class="tag">${e.day}</div>
          <div class="time">${e.time}</div>
          <div class="subject">${e.subject}${roomHtml}</div>
          <button data-id="${e._id}" class="btn btn-danger del" title="Delete"><i class="fa-solid fa-trash"></i> Delete</button>
        </div>`;
    }

    async function load(dayFilter = '') {
      const token = localStorage.getItem('token') || localStorage.getItem('smart_token');
      const list = document.getElementById('list');
      list.setAttribute('aria-busy', 'true');
      const res = await fetch(`${API}${dayFilter ? `?day=${encodeURIComponent(dayFilter)}` : ''}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const items = await res.json();
      list.innerHTML = items.length ? items.map(entryCard).join('') : '<div style="color:#6b7280;">No entries yet</div>';
      list.setAttribute('aria-busy', 'false');

      // Bind delete events
      document.querySelectorAll('.del').forEach(btn => btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        if (!confirm('Delete this entry?')) return;
        const r = await fetch(`${API}/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        if (r.ok) load(document.getElementById('filterDay').value);
      }));
    }

    document.getElementById('filterDay').addEventListener('change', (e) => {
      load(e.target.value || '');
    });

    document.getElementById('ttForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('token') || localStorage.getItem('smart_token');
      const body = {
        day: document.getElementById('day').value,
        time: document.getElementById('time').value,
        subject: document.getElementById('subject').value,
        room: document.getElementById('room').value,
      };
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (res.ok) {
        document.getElementById('ttForm').reset();
        load(document.getElementById('filterDay').value);
      } else {
        alert('Failed to add entry');
      }
    });

    // init
    load();
  </script>
</body>
</html>
