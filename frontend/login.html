<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SmartAcademic</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl p-10 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-24 h-24 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-3xl mx-auto mb-6 flex items-center justify-center">
        <i class="fas fa-graduation-cap text-4xl text-white"></i>
      </div>
      <h1 class="text-4xl font-bold bg-gradient-to-r from-gray-800 to-gray-600 bg-clip-text text-transparent mb-2">SmartAcademic</h1>
      <p class="text-gray-600">Academic Resource Discovery Platform</p>
    </div>
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
        <input type="email" id="email" required placeholder="jane@student.com" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
        <input type="password" id="password" required placeholder="student123" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5">
        <i class="fas fa-sign-in-alt mr-2"></i>Login
      </button>
    </form>
    <div class="mt-6 text-center">
      <p class="text-sm text-gray-600">Test account: <strong>jane@student.com / student123</strong></p>
      <button onclick="location.href='/frontend/student-dashboard.html'" class="mt-4 text-indigo-600 hover:text-indigo-700 font-semibold">Go to Dashboard →</button>
    </div>
    <div id="error" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-xl hidden"></div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:5000/api' : '/api';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...';
      btn.disabled = true;

      const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/frontend/student-dashboard.html';
        } else {
          showError(data.msg || 'Login failed');
        }
      } catch (error) {
        console.error(error);
        showError('Network error - check server');
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });

    function showError(msg) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
      setTimeout(() => errorDiv.classList.add('hidden'), 5000);
    }
  </script>
</body>
</html>
