<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartAcademic · AI Learning Assistant</title>
  <!-- Tailwind + Font Awesome + Chart.js -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* Import modern fonts */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap');
    
    /* CSS Variables for consistent theming */
    :root {
      --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
      --secondary-gradient: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
      --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      --glow-indigo: 0 0 20px rgba(99, 102, 241, 0.4);
      --glow-purple: 0 0 20px rgba(139, 92, 246, 0.4);
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    
    * {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Poppins', sans-serif;
    }
    
    /* Animated Gradient Background */
    .animated-bg {
      background: linear-gradient(-45deg, #f3f4f6, #e5e7eb, #f9fafb, #e0e7ff);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Floating shapes for background */
    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }
    
    .floating-shapes::before,
    .floating-shapes::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      filter: blur(60px);
    }
    
    .floating-shapes::before {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      top: 10%;
      left: -100px;
      animation: float1 20s ease-in-out infinite;
    }
    
    .floating-shapes::after {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      bottom: 10%;
      right: -50px;
      animation: float2 25s ease-in-out infinite;
    }
    
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(50px, 50px) rotate(180deg); }
    }
    
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-30px, -50px) rotate(-180deg); }
    }
    
    /* Fade In Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px rgba(99, 102, 241, 0.5); }
      50% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.8), 0 0 40px rgba(139, 92, 246, 0.4); }
    }
    
    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }
    
    @keyframes typing {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    /* Page Load Animations */
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out forwards;
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .animate-slide-left {
      animation: slideInLeft 0.6s ease-out forwards;
    }
    
    .animate-scale-in {
      animation: scaleIn 0.4s ease-out forwards;
    }
    
    /* Staggered animations for lists */
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }
    .stagger-5 { animation-delay: 0.5s; }
    
    /* Modern Card Styles */
    .modern-card {
      background: white;
      border-radius: 16px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .modern-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--card-shadow-hover), var(--glow-indigo);
    }
    
    /* Gradient Border Effect */
    .gradient-border {
      position: relative;
      background: white;
      border-radius: 16px;
    }
    
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 18px;
      background: var(--primary-gradient);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .gradient-border:hover::before {
      opacity: 1;
    }
    
    /* Stat Card Styles */
    .stat-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--card-shadow);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s ease;
    }
    
    .stat-card:hover::before {
      left: 100%;
    }
    
    .stat-card:hover {
      transform: translateY(-12px);
      box-shadow: var(--card-shadow-hover), var(--glow-purple);
    }
    
    .stat-card .icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      margin-bottom: 16px;
      animation: glow 2s ease-in-out infinite;
    }
    
    /* Sidebar Styles */
    .sidebar-link {
      position: relative;
      transition: all 0.3s ease;
      border-radius: 12px;
      margin: 4px 0;
    }
    
    .sidebar-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0;
      background: var(--primary-gradient);
      border-radius: 12px;
      opacity: 0.1;
      transition: width 0.3s ease;
      z-index: -1;
    }
    
    .sidebar-link:hover::before {
      width: 100%;
    }
    
    .sidebar-link:hover {
      color: #6366f1;
      transform: translateX(8px);
    }
    
    .sidebar-link:hover i {
      transform: scale(1.2);
      color: #6366f1;
    }
    
    .sidebar-link i {
      transition: transform 0.3s ease;
    }
    
    .sidebar-link.active {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
      color: #6366f1;
      font-weight: 600;
    }
    
    /* Subject Card Styles */
    .subject-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    
    .subject-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--primary-gradient);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    
    .subject-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: var(--card-shadow-hover);
    }
    
    .subject-card:hover::after {
      transform: scaleX(1);
    }
    
    .subject-card .card-header {
      background: var(--primary-gradient);
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    
    .subject-card .card-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      transition: all 0.5s ease;
    }
    
    .subject-card:hover .card-header::before {
      animation: shimmer 1s ease;
    }
    
    /* Resource Card Styles */
    .resource-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--card-shadow);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(229, 231, 235, 0.5);
      position: relative;
      overflow: hidden;
    }
    
    .resource-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--card-shadow-hover);
      border-color: rgba(99, 102, 241, 0.3);
    }
    
    .resource-card .resource-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--secondary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      transition: all 0.3s ease;
    }
    
    .resource-card:hover .resource-icon {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
    }
    
    /* Button Styles */
    .btn-primary {
      background: var(--primary-gradient);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s ease;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
    }
    
    .btn-primary:hover::before {
      left: 100%;
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    /* Ripple Effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }
    
    /* Heading Styles with Animation */
    .section-heading {
      position: relative;
      display: inline-block;
      margin-bottom: 32px;
    }
    
    .section-heading::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 60px;
      height: 4px;
      background: var(--primary-gradient);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    
    .section-heading:hover::after {
      width: 100%;
    }
    
    /* Chat Message Styles */
    .chat-message {
      animation: fadeInUp 0.3s ease-out;
      border-radius: 16px;
      padding: 16px;
      margin: 8px 0;
      max-width: 85%;
    }
    
    .chat-message-user {
      background: var(--primary-gradient);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    
    .chat-message-bot {
      background: white;
      border: 1px solid #e5e7eb;
      margin-right: auto;
      border-bottom-left-radius: 4px;
      box-shadow: var(--card-shadow);
    }
    
    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }
    
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    
    /* Video Modal Animation */
    .video-modal {
      animation: scaleIn 0.3s ease-out;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    
    /* Scroll Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.6s ease;
    }
    
    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Gradient Text */
    .gradient-text {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Glass Effect */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--primary-gradient);
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: #4f46e5;
    }
    
    /* Loading Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    
    /* Navigation Active Indicator */
    .nav-indicator {
      position: absolute;
      left: 0;
      width: 4px;
      height: 0;
      background: var(--primary-gradient);
      border-radius: 0 4px 4px 0;
      transition: height 0.3s ease, top 0.3s ease;
    }
    
    /* Table Styles */
    .modern-table {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
    }
    
    .modern-table th {
      background: var(--primary-gradient);
      color: white;
      padding: 16px;
      font-weight: 600;
      text-align: left;
    }
    
    .modern-table td {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
      transition: background 0.2s ease;
    }
    
    .modern-table tr:hover td {
      background: rgba(99, 102, 241, 0.05);
    }
    
    /* Calendar Styles */
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .calendar-day:hover {
      background: rgba(99, 102, 241, 0.1);
      transform: scale(1.1);
    }
    
    .calendar-day.today {
      background: var(--primary-gradient);
      color: white;
      box-shadow: var(--glow-indigo);
    }
    
    /* Badge Styles */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .badge:hover {
      transform: scale(1.05);
    }
    
    .badge-notes { background: #dbeafe; color: #1e40af; }
    .badge-video { background: #fce7f3; color: #be185d; }
    .badge-assignment { background: #d1fae5; color: #065f46; }
    .badge-pyq { background: #fef3c7; color: #92400e; }
    .badge-ppt { background: #e0e7ff; color: #3730a3; }
    .badge-textbook { background: #f3e8ff; color: #6b21a8; }
    
    /* Input Focus Animation */
    .modern-input {
      transition: all 0.3s ease;
      border: 2px solid #e5e7eb;
    }
    
    .modern-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      outline: none;
    }
    
    /* Tooltip */
    .tooltip {
      position: relative;
    }
    
    .tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: #1f2937;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      z-index: 1000;
    }
    
    .tooltip:hover::after {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

  <!-- Floating background shapes -->
  <div class="floating-shapes"></div>
  
  <div id="app" class="min-h-screen flex flex-col relative z-10">
  <!-- top navigation (always visible) -->

    <div class="flex items-center space-x-2">

  </div>
</div>

<script>
  (function () {
    const API_BASE = '/api';
    const TOKEN_KEY = 'auth_token';

    let currentUser = null;
    let authInitialized = false;
    let currentPage = 'home';

    const mainEl = document.getElementById('main-content');

    function normalizeUser(user) {
      if (!user) return null;
      return { ...user, id: user.id || user._id };
    }

    async function apiCall(endpoint, options = {}) {
      const token = localStorage.getItem(TOKEN_KEY);
      const headers = {
          'Content-Type': 'application/json',
        ...(token && { Authorization: `Bearer ${token}` }),
        ...(options.headers || {})
      };

      const response = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers
      });

      if (!response.ok) {
        let errorMsg = 'API error';
        try {
          const errJson = await response.json();
          errorMsg = errJson.msg || errorMsg;
        } catch (_) {}
        throw new Error(errorMsg);
      }
      return response.json();
    }

    async function getBranches() {
      return apiCall('/branches');
    }

    async function getSemesters() {
      return apiCall('/semesters');
    }

    function renderStars(rating = 0) {
      const r = parseFloat(rating) || 0;
      const fullStars = Math.floor(r);
      const hasHalfStar = r % 1 >= 0.5;
      let html = '';
      for (let i = 1; i <= 5; i++) {
        if (i <= fullStars) {
          html += '<i class="fas fa-star text-yellow-400"></i>';
        } else if (i === fullStars + 1 && hasHalfStar) {
          html += '<i class="fas fa-star-half-alt text-yellow-400"></i>';
        } else {
          html += '<i class="far fa-star text-gray-300"></i>';
        }
      }
      return html;
    }

    async function renderFeedbackSection(resourceId, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      container.innerHTML = '<p class="text-sm text-gray-500 italic">Loading feedback...</p>';

      try {
        const feedbackList = await apiCall(`/resources/${resourceId}/feedback`);
        
        const feedbackHtml = feedbackList.map(f => `
          <div class="border-b last:border-0 py-4">
            <div class="flex justify-between items-start mb-1">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-xs">
                  ${f.userName?.charAt(0) || 'U'}
                </div>
                <div>
                  <div class="text-sm font-semibold">${f.userName || 'Student'}</div>
                  <div class="text-xs text-gray-400">${new Date(f.createdAt).toLocaleDateString()}</div>
                </div>
              </div>
              <div class="flex text-xs">
                ${renderStars(f.rating)}
              </div>
            </div>
            <p class="text-sm text-gray-700 mt-2">${f.comment}</p>
            <div class="mt-2 flex items-center gap-4">
              <button class="text-xs text-gray-500 hover:text-indigo-600 flex items-center gap-1 helpful-btn" data-id="${f._id}">

              </button>
            </div>
          </div>
        `).join('') || '<p class="text-sm text-gray-400 italic">No feedback yet. Be the first to review!</p>';

        container.innerHTML = `
          <div class="mt-8 border-t pt-6">
            <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
              <i class="fas fa-comments text-indigo-600"></i> Student Feedback
            </h3>
            
            <!-- Feedback Form -->
            <div class="bg-indigo-50 p-4 rounded-xl mb-6">
              <h4 class="text-sm font-semibold mb-3">Rate this resource</h4>
              <div class="flex gap-1 mb-3 feedback-stars">
                ${[1, 2, 3, 4, 5].map(i => `<i class="far fa-star text-gray-400 cursor-pointer text-xl star-select" data-val="${i}"></i>`).join('')}
              </div>
              <textarea id="feedback-comment" class="w-full border p-2 rounded-lg text-sm mb-3" rows="2" placeholder="Write your feedback..."></textarea>

            </div>

            <!-- Feedback List -->
            <div class="space-y-4">
              ${feedbackHtml}
            </div>
          </div>
        `;

        // Star selection logic
        let selectedRating = 0;
        container.querySelectorAll('.star-select').forEach(star => {
          star.addEventListener('click', () => {
            selectedRating = parseInt(star.getAttribute('data-val'));
            container.querySelectorAll('.star-select').forEach((s, idx) => {
              if (idx < selectedRating) {
                s.classList.remove('far', 'text-gray-400');
                s.classList.add('fas', 'text-yellow-400');
              } else {
                s.classList.remove('fas', 'text-yellow-400');
                s.classList.add('far', 'text-gray-400');
              }
            });
          });
        });

        // Helpful vote logic
        container.querySelectorAll('.helpful-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const fid = btn.getAttribute('data-id');
            try {
              await apiCall(`/feedback/${fid}/helpful`, { method: 'POST' });
              renderFeedbackSection(resourceId, containerId);
            } catch (err) {
              alert(err.message);
            }
          });
        });

        // Submit feedback logic
        const submitBtn = document.getElementById('submit-feedback');
        if (submitBtn) {
            submitBtn.addEventListener('click', async () => {
                const comment = document.getElementById('feedback-comment').value;
                if (selectedRating === 0) return alert('Please select a rating');
                
                try {
                await apiCall('/feedback', {
                    method: 'POST',
                    body: JSON.stringify({
                    resourceId,
                    rating: selectedRating,
                    comment
                    })
                });
                renderFeedbackSection(resourceId, containerId);
                } catch (err) {
                alert(err.message);
                }
            });
        }

      } catch (err) {
        container.innerHTML = `<p class="text-sm text-red-500">Error loading feedback: ${err.message}</p>`;
      }
    }

          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
int binarySearch(int arr[], int left, int right, int key) {
  while (left <= right) {

    if (arr[mid] == key)
      return mid;          // Found
    if (arr[mid] < key)
      left = mid + 1;      // Search right half

            <li><strong>Conceptual Level:</strong> Logical structure of entire database</li>

        html: `
          <p class="mb-3">
            The <strong>Entity-Relationship (ER) Model</strong> is a high-level conceptual data model used to describe
            the structure of a database using entities, attributes, and relationships.
          </p>
          <h4 class="font-semibold mt-4 mb-2">Key Components</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Entity:</strong> A real-world object (e.g., Student, Course)</li>
            <li><strong>Attribute:</strong> Properties of an entity (e.g., name, roll number)</li>
            <li><strong>Relationship:</strong> Association between entities</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Types of Attributes</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Simple:</strong> Cannot be divided (e.g., age)</li>
            <li><strong>Composite:</strong> Can be divided (e.g., address → street, city, pin)</li>
            <li><strong>Single-valued:</strong> One value per entity (e.g., DOB)</li>
            <li><strong>Multi-valued:</strong> Multiple values (e.g., phone numbers)</li>
            <li><strong>Derived:</strong> Computed from other attributes (e.g., age from DOB)</li>

        html: `
          <p class="mb-3">
            The <strong>Relational Model</strong> organizes data into tables (relations) consisting of rows (tuples)
            and columns (attributes). It was proposed by E.F. Codd in 1970.
          </p>
          <h4 class="font-semibold mt-4 mb-2">Key Concepts</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Relation:</strong> A table with rows and columns</li>
            <li><strong>Tuple:</strong> A row in the table (record)</li>
            <li><strong>Attribute:</strong> A column in the table (field)</li>
            <li><strong>Domain:</strong> Set of valid values for an attribute</li>
            <li><strong>Degree:</strong> Number of attributes (columns)</li>
            <li><strong>Cardinality:</strong> Number of tuples (rows)</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Types of Keys</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Primary Key:</strong> Unique identifier for each tuple (cannot be null)</li>
            <li><strong>Candidate Key:</strong> Minimal set of attributes that can uniquely identify tuples</li>
            <li><strong>Alternate Key:</strong> Candidate keys not chosen as primary key</li>
            <li><strong>Foreign Key:</strong> Attribute that establishes relationship between tables</li>
            <li><strong>Super Key:</strong> Set of attributes that can uniquely identify tuples</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Relational Algebra Operations</h4>
          <table class="w-full text-sm border-collapse mb-3">
            <thead>

                <th class="border p-2">Symbol</th>

              <tr><td class="border p-2">Projection</td><td class="border p-2">π</td><td class="border p-2">Selects specific columns</td></tr>
              <tr><td class="border p-2">Union</td><td class="border p-2">∪</td><td class="border p-2">Combines two relations</td></tr>
              <tr><td class="border p-2">Set Difference</td><td class="border p-2">−</td><td class="border p-2">Tuples in R1 but not in R2</td></tr>
              <tr><td class="border p-2">Cartesian Product</td><td class="border p-2">×</td><td class="border p-2">All possible combinations</td></tr>
              <tr><td class="border p-2">Natural Join</td><td class="border p-2">⋈</td><td class="border p-2">Join on common attributes</td></tr>
            </tbody>
          </table>
        `

          <p class="mb-3">
            <strong>SQL (Structured Query Language)</strong> is the standard language for relational database management.
            It is divided into several sub-languages for different operations.
          </p>
          <h4 class="font-semibold mt-4 mb-2">1. DDL - Data Definition Language</h4>
          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
-- CREATE TABLE
CREATE TABLE Students (
  student_id INT PRIMARY KEY,
  name VARCHAR(100) NOT NULL,
  age INT CHECK (age >= 0),
  dept_id INT,
  FOREIGN KEY (dept_id) REFERENCES Departments(dept_id)
);

-- ALTER TABLE
ALTER TABLE Students ADD email VARCHAR(100);
ALTER TABLE Students DROP COLUMN age;

-- DROP TABLE
DROP TABLE Students;
          </pre>
          <h4 class="font-semibold mt-4 mb-2">2. DML - Data Manipulation Language</h4>
          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
-- SELECT with WHERE, ORDER BY, GROUP BY
SELECT name, AVG(marks) as avg_marks
FROM Students s JOIN Marks m ON s.student_id = m.student_id
WHERE year = 2024
GROUP BY s.student_id
HAVING AVG(marks) > 60
ORDER BY avg_marks DESC;

-- INSERT
INSERT INTO Students (student_id, name, age) 
VALUES (1, 'John Doe', 20);

-- UPDATE
UPDATE Students SET age = 21 WHERE student_id = 1;

-- DELETE
DELETE FROM Students WHERE age < 18;
          </pre>
          <h4 class="font-semibold mt-4 mb-2">3. Aggregate Functions</h4>
          <table class="w-full text-sm border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2">Function</th>
                <th class="border p-2">Description</th>
              </tr>

              <tr><td class="border p-2">SUM(column)</td><td class="border p-2">Sum of values</td></tr>
              <tr><td class="border p-2">AVG(column)</td><td class="border p-2">Average of values</td></tr>
              <tr><td class="border p-2">MAX(column)</td><td class="border p-2">Maximum value</td></tr>
              <tr><td class="border p-2">MIN(column)</td><td class="border p-2">Minimum value</td></tr>
            </tbody>
          </table>
          <h4 class="font-semibold mt-4 mb-2">4. Types of Joins</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>INNER JOIN:</strong> Returns matching rows from both tables</li>
            <li><strong>LEFT JOIN:</strong> All rows from left table, matching from right</li>
            <li><strong>RIGHT JOIN:</strong> All rows from right table, matching from left</li>
            <li><strong>FULL OUTER JOIN:</strong> All rows from both tables</li>
            <li><strong>CROSS JOIN:</strong> Cartesian product of both tables</li>
          </ul>
        `

          'BCNF (Boyce-Codd Normal Form)',
          'Decomposition',
          'Lossless Join and Dependency Preservation'

        html: `
          <p class="mb-3">
            <strong>Normalization</strong> is the process of organizing data to minimize redundancy and dependency.
            It involves dividing large tables into smaller ones and defining relationships between them.
          </p>
          <h4 class="font-semibold mt-4 mb-2">Functional Dependencies</h4>
          <p class="mb-2">A functional dependency X → Y means the value of X determines the value of Y.</p>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Trivial FD:</strong> X → Y where Y is subset of X</li>
            <li><strong>Non-trivial FD:</strong> X → Y where Y is not subset of X</li>
            <li><strong>Completely Non-trivial:</strong> X → Y where X ∩ Y = ∅</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Normal Forms</h4>
          <table class="w-full text-sm border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2">Normal Form</th>
                <th class="border p-2">Requirements</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border p-2"><strong>1NF</strong></td>
                <td class="border p-2">Atomic values (no multi-valued attributes), no repeating groups</td>
              </tr>
              <tr>
                <td class="border p-2"><strong>2NF</strong></td>
                <td class="border p-2">1NF + No partial dependencies (non-prime attributes depend on full key)</td>
              </tr>
              <tr>
                <td class="border p-2"><strong>3NF</strong></td>
                <td class="border p-2">2NF + No transitive dependencies (non-prime attributes depend only on key)</td>
              </tr>
              <tr>
                <td class="border p-2"><strong>BCNF</strong></td>
                <td class="border p-2">For every FD X → Y, X must be a superkey (stricter than 3NF)</td>
              </tr>
            </tbody>
          </table>
          <h4 class="font-semibold mt-4 mb-2">Example: Converting to 3NF</h4>
          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
-- Unnormalized Table (Student_ID, Name, Course, Instructor, Instructor_Office)
-- FDs: Student_ID → Name
--      Course → Instructor
--      Instructor → Instructor_Office

-- After 3NF decomposition:

Table Students (
  Student_ID PK,
  Name
)

Table Courses (
  Course PK,
  Instructor FK
)

Table Instructors (
  Instructor PK,
  Instructor_Office
)

Table Enrollments (
  Student_ID FK,
  Course FK,
  PK(Student_ID, Course)
)
          </pre>
        `
      },
      db_transactions: {
        title: 'Transactions and Concurrency Control',
        topics: [
          'ACID Properties',

          'Serializability',
          'Concurrency Control Techniques',
          'Locking: Two-Phase Locking',
          'Deadlock Handling'

        html: `
          <p class="mb-3">
            A <strong>transaction</strong> is a logical unit of work that consists of one or more database operations.
            It must maintain database consistency and integrity.
          </p>
          <h4 class="font-semibold mt-4 mb-2">ACID Properties</h4>
          <table class="w-full text-sm border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2">Property</th>
                <th class="border p-2">Description</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border p-2"><strong>Atomicity</strong></td>
                <td class="border p-2">All operations complete successfully or none do (all-or-nothing)</td>
              </tr>
              <tr>
                <td class="border p-2"><strong>Consistency</strong></td>
                <td class="border p-2">Database remains in consistent state before and after transaction</td>
              </tr>
              <tr>
                <td class="border p-2"><strong>Isolation</strong></td>
                <td class="border p-2">Concurrent transactions execute independently</td>
              </tr>
              <tr>
                <td class="border p-2"><strong>Durability</strong></td>
                <td class="border p-2">Committed changes are permanent even after system failure</td>
              </tr>
            </tbody>
          </table>
          <h4 class="font-semibold mt-4 mb-2">Transaction States</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Active:</strong> Transaction is executing</li>
            <li><strong>Partially Committed:</strong> Final operation executed, waiting to commit</li>
            <li><strong>Committed:</strong> Transaction successfully completed</li>
            <li><strong>Failed:</strong> Normal execution cannot proceed</li>
            <li><strong>Aborted:</strong> Transaction rolled back, database restored to previous state</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Serializability</h4>
          <p class="mb-3">
            A schedule is <strong>serializable</strong> if it is equivalent to some serial schedule.
            Two schedules are equivalent if they produce the same final database state.
          </p>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Conflict Serializability:</strong> Non-conflicting operations can be swapped</li>
            <li><strong>View Serializability:</strong> Same reads and final writes as serial schedule</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Two-Phase Locking (2PL)</h4>
          <p class="mb-3">
            A concurrency control protocol that ensures serializability.
          </p>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Growing Phase:</strong> Acquire locks, cannot release any</li>
            <li><strong>Shrinking Phase:</strong> Release locks, cannot acquire new ones</li>
            <li><strong>Strict 2PL:</strong> Exclusive locks held until commit/abort</li>
            <li><strong>Rigorous 2PL:</strong> All locks held until commit/abort</li>
          </ul>
        `
      },
      db_indexing: {
        title: 'Indexing and Query Optimization',
        topics: [

        html: `
          <p class="mb-3">
            <strong>Indexing</strong> is a data structure technique to efficiently retrieve records from a database.
            It creates a data structure that improves the speed of data retrieval operations.
          </p>
          <h4 class="font-semibold mt-4 mb-2">Types of Indexes</h4>
          <table class="w-full text-sm border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2">Index Type</th>
                <th class="border p-2">Description</th>
                <th class="border p-2">Use Case</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border p-2">B-Tree/B+ Tree</td>
                <td class="border p-2">Balanced tree structure</td>
                <td class="border p-2">Range queries, sorting</td>
              </tr>
              <tr>
                <td class="border p-2">Hash Index</td>
                <td class="border p-2">Hash function maps key to bucket</td>
                <td class="border p-2">Exact match queries</td>
              </tr>
              <tr>
                <td class="border p-2">Bitmap Index</td>
                <td class="border p-2">Bitmap for each distinct value</td>
                <td class="border p-2">Low cardinality columns</td>
              </tr>
            </tbody>
          </table>
          <h4 class="font-semibold mt-4 mb-2">Primary vs Secondary Index</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Primary Index:</strong> Built on primary key, determines storage order (sparse)</li>
            <li><strong>Secondary Index:</strong> Built on non-key attributes, dense index</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Clustered vs Non-clustered</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Clustered Index:</strong> Data rows stored in index order (only one per table)</li>
            <li><strong>Non-clustered:</strong> Index separate from data, contains pointers to data</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">B+ Tree Properties</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li>All data pointers are at leaf nodes</li>
            <li>Leaf nodes are linked for efficient range queries</li>
            <li>All leaf nodes are at same depth (balanced)</li>
            <li>Internal nodes only store keys for navigation</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Query Optimization Techniques</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Cost-based optimization:</strong> Estimate cost of different execution plans</li>
            <li><strong>Index selection:</strong> Choose appropriate indexes for query</li>
            <li><strong>Join ordering:</strong> Find optimal order for joining multiple tables</li>
            <li><strong>Predicate pushdown:</strong> Apply filters as early as possible</li>
            <li><strong>Materialized views:</strong> Pre-compute and store expensive query results</li>
          </ul>
        `
      },

        html: `
          <p class="mb-3">
            A <strong>process</strong> is a program in execution. It includes the program code, current activity (program counter,
            registers), and resources (memory, open files).
          </p>
          <h4 class="font-semibold mt-4 mb-2">Process States</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>New:</strong> Process being created</li>

          </pre>

          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">

          <p class="mb-3">
            A <strong>deadlock</strong> is a situation where a set of processes are blocked because each process
            is holding a resource and waiting for another resource acquired by some other process.
          </p>
          <h4 class="font-semibold mt-4 mb-2">Four Necessary Conditions for Deadlock</h4>
          <p class="mb-2">All four must hold simultaneously:</p>
          <ol class="list-decimal list-inside mb-3 space-y-1">
            <li><strong>Mutual Exclusion:</strong> At least one resource must be non-sharable</li>
            <li><strong>Hold and Wait:</strong> Process holding at least one resource is waiting for more</li>
            <li><strong>No Preemption:</strong> Resources cannot be forcibly taken; must be released voluntarily</li>
            <li><strong>Circular Wait:</strong> Circular chain of processes, each waiting for next\'s resource</li>
          </ol>
          <h4 class="font-semibold mt-4 mb-2">Resource Allocation Graph</h4>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li>Vertices: Processes (circles) and Resources (rectangles)</li>
            <li>Request Edge: Process → Resource (directed edge)</li>
            <li>Assignment Edge: Resource → Process (directed edge)</li>
            <li><strong>If no cycles → No deadlock</strong></li>
            <li><strong>If cycle and single instance per resource type → Deadlock</strong></li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Deadlock Prevention</h4>
          <p class="mb-2">Break at least one of the four conditions:</p>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Mutual Exclusion:</strong> Make resources sharable (not always possible)</li>
            <li><strong>Hold and Wait:</strong> Request all resources at once, or release before requesting</li>
            <li><strong>No Preemption:</strong> If process cannot get resource, release all held resources</li>
            <li><strong>Circular Wait:</strong> Impose ordering on resource types, request in order</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">Banker\'s Algorithm (Deadlock Avoidance)</h4>
          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
// Safety Algorithm
1. Work = Available, Finish[i] = false for all i
2. Find i where Finish[i] == false and Need[i] <= Work
   If no such i exists, go to step 4
3. Work = Work + Allocation[i], Finish[i] = true, go to step 2
4. If Finish[i] == true for all i, system is in SAFE state

// Resource Request Algorithm
Request[i] <= Need[i]? (otherwise error)
Request[i] <= Available[i]? (otherwise wait)
Available = Available - Request[i]
Allocation[i] = Allocation[i] + Request[i]
Need[i] = Need[i] - Request[i]
Check safety; if safe, grant request
          </pre>
        `
      },

          <h4 class="font-semibold mt-4 mb-2">Memory Hierarchy</h4>
          <p class="mb-2">From fastest/smallest to slowest/largest:</p>
          <ol class="list-decimal list-inside mb-3 space-y-1">
            <li>Registers (1KB, 1ns)</li>
            <li>Cache (MB, 10ns)</li>
            <li>Main Memory (GB, 100ns)</li>
            <li>SSD (TB, 100μs)</li>
            <li>HDD (TB, 10ms)</li>
          </ol>
          <h4 class="font-semibold mt-4 mb-2">Paging</h4>
          <p class="mb-2">
            Physical memory divided into fixed-size blocks called <strong>frames</strong>.
            Logical memory divided into same-size blocks called <strong>pages</strong>.
          </p>
          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
// Address Translation
Logical Address = [Page Number | Page Offset]

Page Number = LA / Page Size
Page Offset = LA % Page Size

Page Table maps Page Number → Frame Number
Physical Address = Frame Number * Page Size + Offset

// Example: Page size = 4KB (4096 bytes)
// Logical address 15000:
Page Number = 15000 / 4096 = 3
Page Offset = 15000 % 4096 = 2712
          </pre>
          <h4 class="font-semibold mt-4 mb-2">Segmentation</h4>
          <p class="mb-2">
            Logical address space divided into variable-size segments (code, data, stack).
            Each segment has base address and limit.
          </p>
          <pre class="bg-gray-900 text-gray-100 text-sm rounded-lg p-3 overflow-auto mb-3">
Logical Address = [Segment Number | Offset]

Segment Number selects segment table entry
Offset must be < Limit (otherwise trap)
Physical Address = Base + Offset
          </pre>
          <h4 class="font-semibold mt-4 mb-2">Virtual Memory</h4>
          <p class="mb-3">
            Separation of user logical memory from physical memory. Only part of program needs to be in memory.

          <p class="mb-3">
            A <strong>file</strong> is a collection of related information recorded on secondary storage.

          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>Single-Level:</strong> All files in one directory</li>
            <li><strong>Two-Level:</strong> Separate directories for each user</li>
            <li><strong>Tree-Structured:</strong> Hierarchical with arbitrary depth</li>
            <li><strong>Acyclic Graph:</strong> Allows shared files/subdirectories (links)</li>
            <li><strong>General Graph:</strong> Allows cycles (requires garbage collection)</li>
          </ul>
          <h4 class="font-semibold mt-4 mb-2">File Allocation Methods</h4>
          <table class="w-full text-sm border-collapse mb-3">
            <thead>
              <tr class="bg-gray-100">
                <th class="border p-2">Method</th>
                <th class="border p-2">Description</th>
                <th class="border p-2">Pros/Cons</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="border p-2">Contiguous</td>
                <td class="border p-2">Each file occupies contiguous blocks</td>
                <td class="border p-2">Simple, fast access; suffers fragmentation</td>
              </tr>
              <tr>
                <td class="border p-2">Linked</td>
                <td class="border p-2">Each file is linked list of blocks</td>
                <td class="border p-2">No fragmentation; slow access, no random</td>
              </tr>
              <tr>
                <td class="border p-2">Indexed</td>
                <td class="border p-2">Index block contains pointers to file blocks</td>
                <td class="border p-2">Supports direct access, efficient</td>
              </tr>
            </tbody>
          </table>
          <h4 class="font-semibold mt-4 mb-2">Disk Scheduling Algorithms</h4>
          <p class="mb-2">Goal: Minimize seek time (disk head movement)</p>
          <ul class="list-disc list-inside mb-3 space-y-1">
            <li><strong>FCFS:</strong> First-come, first-served</li>
            <li><strong>SSTF:</strong> Shortest seek time first (may cause starvation)</li>
            <li><strong>SCAN:</strong> Disk arm moves back and forth across disk (elevator)</li>
            <li><strong>C-SCAN:</strong> Circular SCAN, returns to start without serving</li>
            <li><strong>LOOK:</strong> Like SCAN but only goes to last request in each direction</li>
          </ul>

    async function login(email, password) {
      const data = await apiCall('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      localStorage.setItem(TOKEN_KEY, data.token);
      currentUser = normalizeUser(data.user);
      updateAuthUI();
      return currentUser;
    }

    async function register(userData) {
      const data = await apiCall('/auth/register', {
        method: 'POST',
        body: JSON.stringify(userData)
      });
      localStorage.setItem(TOKEN_KEY, data.token);
      currentUser = normalizeUser(data.user);
      updateAuthUI();
      return currentUser;
    }

    function clearAuth() {
      currentUser = null;
      localStorage.removeItem(TOKEN_KEY);
    }

    async function initAuth() {
      if (authInitialized) return;
      authInitialized = true;
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) return;
      try {
        const user = await apiCall('/auth/me');
        currentUser = normalizeUser(user);
      } catch (_) {
        clearAuth();
      }
    }

    function updateAuthUI() {
      const sidebar = document.getElementById('sidebar');
      const topRight = document.getElementById('top-nav-right');
      const sidebarUser = document.getElementById('sidebar-user');

      if (currentUser) {
        sidebar?.classList.remove('hidden');
        sidebar?.classList.add('flex');
        if (sidebarUser) {
          sidebarUser.innerHTML =
            `<span class="font-semibold">${currentUser.name}</span><br>` +
            `<span class="text-xs uppercase">${currentUser.role}</span>`;
        }
        topRight.innerHTML = `
          <a href="#dashboard" class="text-gray-700 hover:text-indigo-600 px-2 py-1">${currentUser.name}</a>
          <button id="top-logout" class="text-red-600 hover:text-red-700 text-sm px-2 py-1">Logout</button>
        `;
      } else {
        sidebar?.classList.add('hidden');
        sidebar?.classList.remove('flex');
        topRight.innerHTML = `
          <a href="#login" class="text-gray-700 hover:text-indigo-600 px-2 py-1">Login</a>
          <a href="#register" class="bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-3 py-1 rounded-md">Register</a>
        `;
      }

      document.querySelectorAll('.sidebar-link').forEach(link => {
        link.classList.remove('bg-indigo-100', 'text-indigo-800');
        if (link.getAttribute('href') === `#${currentPage}`) {
          link.classList.add('bg-indigo-100', 'text-indigo-800');
        }
      });
    }

    document.addEventListener('click', (e) => {
      if (e.target.matches('#logout-sidebar') || e.target.closest('#logout-sidebar') ||
          e.target.matches('#top-logout')) {
        e.preventDefault();
        clearAuth();
      updateAuthUI();
      window.location.hash = 'home';
      }
    });

    async function navigate() {
      const hashRaw = window.location.hash.slice(1) || 'home';
      const [pagePart, paramPart] = hashRaw.split('/');
      currentPage = pagePart || 'home';

      await renderPage(currentPage, paramPart);
      updateAuthUI();
    }

    window.addEventListener('hashchange', async () => {
      await initAuth();
      await navigate();
    });

    window.addEventListener('load', async () => {
      await initAuth();
      await navigate();
    });

    async function renderPage(page, param) {
      if (!mainEl) return;
      switch (page) {
        case 'home': await renderHome(); break;
        case 'subjects': await renderSubjects(); break;
        case 'subject': await renderSubjectDetail(param); break;
        case 'library': await renderLibrary(); break;
        case 'upload': await renderUpload(); break;
        case 'timetable': await renderTimetable(); break;
        case 'chatbot': await renderChatbot(); break;
        case 'profile': await renderProfile(); break;
        case 'login': renderLogin(); break;
        case 'register': await renderRegister(); break;
        case 'dashboard': await renderDashboard(); break;
        default: await renderHome();
      }
    }

        function refreshActiveTab() {
          Object.keys(tabContents).forEach(key => {
            if (!tabContents[key]) return;
            tabContents[key].classList.toggle('hidden', key !== activeTab);
          });

          switch (activeTab) {
            case 'notes': renderNotes(); break;
            case 'videos': renderVideos(); break;
            case 'assignments': renderAssignments(); break;
            case 'papers': renderPapers(); break;
            case 'references': renderReferences(); break;
          }
        }

        tabButtons.forEach(btn => {
          btn.addEventListener('click', () => {
            const tab = btn.getAttribute('data-tab');
            if (!tab || tab === activeTab) return;
            activeTab = tab;
            tabButtons.forEach(b => b.classList.remove('border-indigo-600', 'text-indigo-700'));
            btn.classList.add('border-indigo-600', 'text-indigo-700');
            refreshActiveTab();
          });
        });

        document.querySelectorAll('.subject-filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const target = btn.getAttribute('data-target-tab');
            if (!target) return;
            activeTab = target;
            tabButtons.forEach(b => {
              const tab = b.getAttribute('data-tab');
              b.classList.toggle('border-indigo-600', tab === activeTab);
              b.classList.toggle('text-indigo-700', tab === activeTab);
            });
            document.querySelectorAll('.subject-filter-btn').forEach(f => {
              f.classList.remove('border-indigo-500', 'text-indigo-600', 'bg-indigo-50');
              f.classList.add('border-gray-200', 'text-gray-600');
            });
            btn.classList.add('border-indigo-500', 'text-indigo-600', 'bg-indigo-50');
            btn.classList.remove('border-gray-200', 'text-gray-600');
            refreshActiveTab();
          });
        });

        searchInput?.addEventListener('input', () => {
          refreshActiveTab();
        });

        renderRecent();
        refreshActiveTab();

        console.error(err);

        if (semester) {

        if (type) {

        if (keyword) {
          filtered = filtered.filter(r =>

        const countEl = document.getElementById('results-count');

    // ---------- UPLOAD ----------
    async function renderUpload() {
      if (!currentUser) {
        window.location.hash = 'login';
        return;
      }

      const subjects = await getSubjects({ branchId: currentUser.branchId, semesterId: currentUser.semesterId });

      mainEl.innerHTML = `
        <h1 class="text-2xl font-bold mb-4">📤 Upload Study Material</h1>
        <div class="bg-white p-6 rounded-xl border max-w-xl">
          <form id="upload-form">
            <label class="block mb-2">Title</label>
            <input type="text" id="res-title" class="w-full border p-2 rounded mb-3" required>

            <label class="block mb-2">Subject</label>
            <select id="res-subject" class="w-full border p-2 rounded mb-3" required>
              ${subjects.map(s => `<option value="${s._id}">${s.name}</option>`).join('')}
            </select>

            <label class="block mb-2">Resource type</label>
            <select id="res-type" class="w-full border p-2 rounded mb-3">
              <option value="notes">Notes</option>
              <option value="ppt">PPT</option>
              <option value="textbook">Textbook</option>
              <option value="pyq">PYQ</option>
            </select>

            <label class="block mb-2">File</label>
            <input type="file" id="res-file" class="w-full border p-2 rounded mb-4" required>

            <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded">Submit for approval</button>
          </form>
        </div>
      `;

      document.getElementById('upload-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('res-title').value;
        const subjectId = document.getElementById('res-subject').value;
        const type = document.getElementById('res-type').value;
        const fileInput = document.getElementById('res-file');
        const file = fileInput.files[0];
        if (!file) return;

        const fd = new FormData();
        fd.append('title', title);
        fd.append('subjectId', subjectId);
        fd.append('type', type);
        fd.append('file', file);

        const token = localStorage.getItem(TOKEN_KEY);
        try {
          const res = await fetch(`${API_BASE}/resources`, {
            method: 'POST',
            headers: {
              ...(token && { Authorization: `Bearer ${token}` })
            },
            body: fd
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.msg || 'Upload failed');
          }
        alert('Uploaded! Pending admin approval.');
        window.location.hash = 'library';
        } catch (err) {
          alert(err.message);
        }
      });
    }

          const matchTitle = r.title.toLowerCase().includes(q);
          const matchSubject = r.subject.toLowerCase().includes(q);
          const matchBranch = r.branch.toLowerCase().includes(q);
          const matchType = type ? r.type === type : true;
          return (matchTitle || matchSubject || matchBranch) && matchType;
        });
        return results.slice(0, limit);

      // Generate timetable mapped from API subject data
      async function generateTimetableData(semesterId, branchId) {
        if (!semesterId || !branchId) return {};
        
        try {
          const subjects = await getSubjects({ branchId, semesterId });
          const timetable = {};
          
          days.forEach(day => {
            timetable[day] = {};
            timeSlots.forEach(slot => {
              timetable[day][slot] = { type: 'free', name: '-', room: '-' }; // Default empty
            });
          });
          
          // Populate slots from subjects
          subjects.forEach(subject => {
            if (subject.timetableSlots && subject.timetableSlots.length > 0) {
              subject.timetableSlots.forEach(slotData => {
                if (timetable[slotData.day] && timetable[slotData.day][slotData.time]) {
                  timetable[slotData.day][slotData.time] = {
                    type: slotData.type || 'theory',
                    name: subject.name,
                    room: slotData.room || 'TBA'
                  };
                }
              });
            }
          });
          
          return { timetable, subjectCount: subjects.length };
        } catch (err) {
          console.error('Failed to fetch subjects for timetable', err);
          return { timetable: {}, subjectCount: 0 };
        }
      }

          calendarState.displayedMonth--;

            calendarState.displayedMonth = 11;
            calendarState.displayedYear--;
          }
          updateCalendar();
        });

        // Next month
        document.getElementById('next-month')?.addEventListener('click', () => {
          calendarState.displayedMonth++;
          if (calendarState.displayedMonth > 11) {
            calendarState.displayedMonth = 0;
            calendarState.displayedYear++;
          }
          updateCalendar();
        });

          const today = new Date();
          calendarState.displayedMonth = today.getMonth();
          calendarState.displayedYear = today.getFullYear();
          updateCalendar();

            <input type="email" id="login-email" placeholder="Email" class="w-full border p-3 rounded mb-4" required>
            <input type="password" id="login-password" placeholder="Password" class="w-full border p-3 rounded mb-4" required>
            <button type="submit" class="bg-indigo-600 text-white w-full py-3 rounded mb-3">Sign in</button>
          </form>
          <div class="flex gap-2">
            <button id="demo-student" class="flex-1 bg-green-100 text-green-700 py-2 rounded border border-green-300">Demo Student</button>
            <button id="demo-admin" class="flex-1 bg-purple-100 text-purple-700 py-2 rounded border border-purple-300">Demo Admin</button>
          </div>
          <p class="text-xs text-gray-500 mt-4">
            Admin: admin@smartacademic.com / admin123<br>
            Student: jane@student.com / student123<br>
            IT Student: it@student.com / student123
          </p>
        </div>
      `;

      document.getElementById('login-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        try {
          await login(email, password);
          window.location.hash = 'dashboard';
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById('demo-student')?.addEventListener('click', async () => {
        try {
          await login('jane@student.com', 'student123');
        window.location.hash = 'dashboard';
        } catch (err) {
          alert(err.message);
        }
      });

      document.getElementById('demo-admin')?.addEventListener('click', async () => {
        try {
          await login('admin@smartacademic.com', 'admin123');
        window.location.hash = 'dashboard';
        } catch (err) {
          alert(err.message);
        }
      });
    }

    // ---------- REGISTER ----------
    async function renderRegister() {
      const branches = await getBranches();
      const semesters = await getSemesters();

      mainEl.innerHTML = `
        <div class="max-w-md mx-auto bg-white p-8 rounded-2xl border mt-5">
          <h2 class="text-2xl font-bold mb-6">Register</h2>
          <form id="register-form">
            <input type="text" id="reg-name" placeholder="Full name" class="w-full border p-3 rounded mb-3" required>
            <input type="email" id="reg-email" placeholder="Email" class="w-full border p-3 rounded mb-3" required>
            <input type="password" id="reg-password" placeholder="Password" class="w-full border p-3 rounded mb-3" required>
            <select id="reg-branch" class="w-full border p-3 rounded mb-3">
              ${branches.map(b => `<option value="${b._id}">${b.name}</option>`).join('')}
            </select>
            <input type="number" id="reg-year" placeholder="Year (1-4)" min="1" max="4" class="w-full border p-3 rounded mb-3" required>
            <select id="reg-semester" class="w-full border p-3 rounded mb-4">
              ${semesters.map(s => `<option value="${s._id}">Sem ${s.number}</option>`).join('')}
            </select>
            <button type="submit" class="bg-indigo-600 text-white w-full py-3 rounded">Register</button>
          </form>
        </div>
      `;

      document.getElementById('register-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value,
          branchId: document.getElementById('reg-branch').value,
          year: parseInt(document.getElementById('reg-year').value, 10),
          semesterId: document.getElementById('reg-semester').value
        };
        try {
          await register(payload);
          window.location.hash = 'dashboard';
        } catch (err) {
          alert(err.message);
        }
      });
    }

    // ---------- DASHBOARD ----------
    async function renderDashboard() {
      if (!currentUser) {
        window.location.hash = 'login';
        return;
      }
      if (currentUser.role === 'admin') {
        await renderAdminDashboard();
      } else {
        await renderStudentDashboard();
      }
    }

    async function renderStudentDashboard() {
      try {
        const [uploads, recs] = await Promise.all([
          apiCall('/resources/user'),
          getResources({
            approved: true,
            branchId: currentUser.branchId,
            semesterId: currentUser.semesterId,
            limit: 6
          })
        ]);

        mainEl.innerHTML = `
          <div class="animate-fade-in">
            <h1 class="section-heading text-3xl font-bold mb-2 gradient-text">Student Dashboard</h1>
            <p class="text-gray-600 mb-8">Welcome back! Here's your academic overview.</p>
            
            <div class="grid md:grid-cols-3 gap-6 mb-8">
              <div class="stat-card animate-fade-in-up stagger-1">
                <div class="icon-wrapper">
                  <i class="fas fa-upload"></i>
        
        <div class="modern-card p-6 mb-6 animate-fade-in-up stagger-4">
          <h2 class="font-semibold text-xl mb-4 flex items-center gap-2">
            <i class="fas fa-clock text-indigo-500"></i>
            Your Recent Uploads
          </h2>
          <div class="space-y-3">
            ${uploads.map(r => `
              <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg hover:bg-indigo-50 transition-colors cursor-pointer">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white">
                  <i class="fas fa-file-alt"></i>
                </div>
                <div class="flex-1">
                  <div class="font-medium text-gray-800">${r.title}</div>
                  <div class="text-xs text-gray-500">${r.type || 'Document'} • ${new Date(r.createdAt).toLocaleDateString()}</div>
                </div>
                <i class="fas fa-chevron-right text-gray-400"></i>
              </div>
            `).join('') || '<p class="text-gray-400 italic">No uploads yet. Start sharing resources!</p>'}
          </div>
        </div>
        
        <div class="modern-card p-6 animate-fade-in-up stagger-5">
          <h2 class="font-semibold text-xl mb-4 flex items-center gap-2">
            <i class="fas fa-lightbulb text-yellow-500"></i>
            Recommended for You
          </h2>
          <div class="grid md:grid-cols-2 gap-4">
            ${recs.map(r => `
              <div class="resource-card cursor-pointer" onclick="window.location.hash='library'">
                <div class="flex items-start gap-3">
                  <div class="resource-icon">
                    <i class="fas fa-${r.type === 'video' ? 'play-circle' : 'file-alt'}"></i>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="font-medium text-gray-800 truncate">${r.title}</div>
                    <span class="badge badge-${r.type} mt-1">${r.type}</span>
                  </div>
                </div>
              </div>
            `).join('') || '<p class="text-gray-400 italic col-span-2">No recommendations available.</p>'}
          </div>
        </div>
      `;
      } catch (err) {
        console.error(err);
        mainEl.innerHTML = '<p class="text-red-500">Failed to load dashboard.</p>';
      }
    }

    async function renderAdminDashboard() {
      try {
        const [overview, pending, allFeedback] = await Promise.all([
          apiCall('/admin/overview'),
          getResources({ approved: false, limit: 50 }),
          apiCall('/feedback/admin/all')
        ]);

      mainEl.innerHTML = `
        <h1 class="text-2xl font-bold mb-3">Admin Dashboard</h1>
        <div class="grid md:grid-cols-4 gap-3 mb-6">
            <div class="bg-white p-3 rounded border shadow-sm">👥 Users: ${overview.userCount}</div>
            <div class="bg-white p-3 rounded border shadow-sm">📄 Pending: ${overview.pendingResources}</div>
            <div class="bg-white p-3 rounded border shadow-sm">📚 Resources: ${overview.totalResources}</div>
            <div class="bg-white p-3 rounded border shadow-sm">📈 Downloads: ${overview.totalDownloads}</div>
        </div>
        
        <div class="grid lg:grid-cols-2 gap-6">
          <div class="bg-white p-4 rounded-xl shadow-sm border">
            <h3 class="font-bold mb-4">Resource Distribution</h3>
            <canvas id="adminChart" style="max-height:250px"></canvas>
          </div>
          
          <div class="bg-white p-4 rounded-xl shadow-sm border">
            <h3 class="font-bold mb-4">Pending Approval</h3>
            <ul id="pending-list" class="space-y-2">
              ${pending.map(p => `
                <li class="p-3 bg-gray-50 rounded-lg flex justify-between items-center">
                  <span class="text-sm font-medium">${p.title}</span>
                  <button class="bg-green-600 text-white px-3 py-1 rounded text-xs approve-btn" data-id="${p._id}">Approve</button>
                </li>
              `).join('') || '<p class="text-gray-400 text-sm italic">No pending resources.</p>'}
            </ul>
          </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm border">
          <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
            <i class="fas fa-comments text-indigo-600"></i> Feedback Management
          </h2>
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
              <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                <tr>
                  <th class="px-4 py-3">User</th>
                  <th class="px-4 py-3">Resource</th>
                  <th class="px-4 py-3">Rating</th>
                  <th class="px-4 py-3">Comment</th>
                  <th class="px-4 py-3">Action</th>
                </tr>
              </thead>
              <tbody>
                ${allFeedback.map(f => `
                  <tr class="border-b hover:bg-gray-50">
                    <td class="px-4 py-3 font-medium">${f.userName}</td>
                    <td class="px-4 py-3 text-gray-500">${f.resourceTitle}</td>
                    <td class="px-4 py-3 text-yellow-500">${renderStars(f.rating)}</td>
                    <td class="px-4 py-3 text-gray-600">${f.comment}</td>
                    <td class="px-4 py-3">
                      <button class="text-red-600 hover:text-red-900 delete-feedback-btn" data-id="${f._id}">
                        <i class="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                `).join('') || '<tr><td colspan="5" class="py-4 text-center text-gray-400 italic">No feedback found.</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      `;

        const uploadsByType = overview.uploadsByType || {};
        const labels = ['notes', 'ppt', 'textbook', 'pyq'];
        const dataSet = labels.map(l => uploadsByType[l] || 0);

        const ctx = document.getElementById('adminChart');
        if (ctx) {
          new Chart(ctx, {
        type: 'bar',
            data: {
              labels: labels.map(l => l.toUpperCase()),
              datasets: [{
                label: 'Uploads by type',
                data: dataSet,
                backgroundColor: '#4f46e5'
              }]
            }
          });
        }

      document.querySelectorAll('.approve-btn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.getAttribute('data-id');
            try {
              await apiCall(`/resources/${id}/approve`, { method: 'PUT' });
              await renderAdminDashboard();
            } catch (err) {
              alert(err.message);
            }
        });
      });

      document.querySelectorAll('.delete-feedback-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          if (!confirm('Are you sure you want to delete this feedback?')) return;
          const id = e.currentTarget.getAttribute('data-id');
          try {
            await apiCall(`/feedback/${id}`, { method: 'DELETE' });
            await renderAdminDashboard();
          } catch (err) {
            alert(err.message);
          }
        });
      });
      } catch (err) {
        console.error(err);
        mainEl.innerHTML = '<p class="text-red-500">Failed to load admin analytics.</p>';
      }
    }

    async function renderProfile() {
      if (!currentUser) {
        window.location.hash = 'login';
        return;
      }

      try {
        mainEl.innerHTML = '<div class="p-8 text-center"><i class="fas fa-spinner fa-spin text-4xl text-indigo-600"></i></div>';
        
        // Re-fetch current user to get populated data
        const user = await apiCall('/auth/me');
        const settings = await apiCall('/settings');
        
        mainEl.innerHTML = `
          <div class="max-w-4xl mx-auto">
            <div class="modern-card p-8 mb-8 animate-fade-in-up">
              <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="relative">
                  <div class="w-32 h-32 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-5xl font-bold shadow-lg">
                    ${user.name.charAt(0)}
                  </div>
                  <div class="absolute bottom-0 right-0 w-8 h-8 bg-green-500 border-4 border-white rounded-full"></div>
                </div>
                <div class="flex-1 text-center md:text-left">
                  <h1 class="text-3xl font-bold text-gray-800">${user.name}</h1>
                  <p class="text-indigo-600 font-medium mb-2">${user.role.toUpperCase()}</p>
                  <p class="text-gray-500 flex items-center justify-center md:justify-start gap-2">
                    <i class="fas fa-envelope"></i> ${user.email}
                  </p>
                </div>
                <button class="btn-primary" id="edit-profile-btn">
                  <i class="fas fa-edit mr-2"></i> Edit Profile
                </button>
              </div>
            </div>

            <div class="grid md:grid-cols-2 gap-6 animate-fade-in-up stagger-1">
              <!-- Academic Info -->
              <div class="modern-card p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-graduation-cap text-indigo-600"></i> Academic Details
                </h2>
                <div class="space-y-4">
                  <div>
                    <label class="text-xs text-gray-400 uppercase font-bold tracking-wider">Branch</label>
                    <p class="text-gray-700 font-medium">${user.branchId?.name || 'Not Set'}</p>
                  </div>
                  <div>
                    <label class="text-xs text-gray-400 uppercase font-bold tracking-wider">Semester</label>
                    <p class="text-gray-700 font-medium">Semester ${user.semesterId?.number || 'Not Set'}</p>
                  </div>
                  <div>
                    <label class="text-xs text-gray-400 uppercase font-bold tracking-wider">Year</label>
                    <p class="text-gray-700 font-medium">${user.year || 'Not Set'}</p>
                  </div>
                </div>
              </div>

              <!-- Preferences -->
              <div class="modern-card p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-cog text-purple-600"></i> Preferences
                </h2>
                <div class="space-y-4">
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-gray-700 font-medium">Dark Mode</p>
                      <p class="text-xs text-gray-400">Enable dark theme</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                      <input type="checkbox" value="" class="sr-only peer" ${settings.theme === 'dark' ? 'checked' : ''}>
                      <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                  </div>
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-gray-700 font-medium">Email Notifications</p>
                      <p class="text-xs text-gray-400">Receive updates via email</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                      <input type="checkbox" value="" class="sr-only peer" ${settings.notifications?.email ? 'checked' : ''}>
                      <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-indigo-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                  </div>
                </div>
              </div>
            </div>
            
            <div class="modern-card p-6 mt-6 animate-fade-in-up stagger-2">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                  <i class="fas fa-info-circle text-blue-600"></i> About Me
                </h2>
                <p class="text-gray-600 italic">
                    ${settings.profile?.bio || 'You haven\'t added a bio yet. Click Edit Profile to share a bit about yourself!'}
                </p>
            </div>
          </div>
        `;

        document.getElementById('edit-profile-btn').addEventListener('click', () => {
            alert('Profile editing coming soon!');
        });

      } catch (err) {
        console.error(err);
        mainEl.innerHTML = '<div class="p-8 text-center text-red-500">Failed to load profile.</div>';
      }
    }
  })();
</script>
</body>
</html>
